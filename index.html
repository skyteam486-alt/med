<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>med</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top left, rgba(51, 102, 255, 0.18), transparent 34rem),
          linear-gradient(135deg, #f7f9fc 0%, #eaf0ff 100%);
        color: #111827;
      }

      main {
        width: min(90vw, 42rem);
        padding: 3rem;
        border: 1px solid rgba(17, 24, 39, 0.08);
        border-radius: 1.5rem;
        background: rgba(255, 255, 255, 0.78);
        box-shadow: 0 1.5rem 5rem rgba(31, 41, 55, 0.14);
        backdrop-filter: blur(18px);
      }

      h1 {
        margin: 0 0 1rem;
        font-size: clamp(3rem, 12vw, 6rem);
        line-height: 0.9;
        letter-spacing: -0.08em;
      }

      p {
        margin: 0;
        max-width: 34rem;
        color: #4b5563;
        font-size: clamp(1rem, 3vw, 1.25rem);
        line-height: 1.6;
      }

      @media (prefers-color-scheme: dark) {
        body {
          background:
            radial-gradient(circle at top left, rgba(96, 165, 250, 0.28), transparent 34rem),
            linear-gradient(135deg, #020617 0%, #111827 100%);
          color: #f9fafb;
        }

        main {
          border-color: rgba(249, 250, 251, 0.1);
          background: rgba(15, 23, 42, 0.78);
          box-shadow: 0 1.5rem 5rem rgba(0, 0, 0, 0.3);
        }

        p {
          color: #cbd5e1;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>med</h1>
      <p>The med site is live on Vercel.</p>
    </main>
  </body>
</html>
